<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Postbank FAQ Assistant</title>

  <!-- Brand font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --brand-bg: #111827;   /* header bg */
      --brand-accent: #2563eb;
      --page-bg: #f4f6f8;
      --ink: #111827;
      --ink-subtle: #6b7280;
      --shell: #ffffff;
      --chip-bg: #e5f3ff;
      --bot-bubble: #f0f4f8;
    }

    /* Page */
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      margin: 0;
      background: var(--page-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--ink);
    }

    /* Container */
    .chat-container {
      width: 95%;
      max-width: 900px;            /* a bit wider to fit the iframe nicely */
      height: 90vh;
      background: var(--shell);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.08);
    }

    /* Header */
    .chat-header {
      background: var(--brand-bg);
      color: #ffffff;
      padding: 16px 20px;
      font-weight: 600;
      font-size: 17px;
      letter-spacing: 0.5px;
    }

    /* Welcome strip (optional) */
    .welcome-text {
      background-color: var(--chip-bg);
      padding: 12px 16px;
      border-radius: 10px;
      margin: 12px 20px 0 20px;
      text-align: center;
      font-size: 14px;
      color: var(--ink);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .welcome-text h3 {
      margin: 0 0 4px 0;
      font-weight: 600;
      font-size: 16px;
    }
    .welcome-text p {
      margin: 0;
      font-size: 13px;
      color: var(--ink-subtle);
    }

    /* Iframe wrapper fills remaining height */
    .iframe-wrap {
      flex: 1;
      margin: 12px 20px 8px 20px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      background: #fff; /* prevents white flash during load */
    }

    /* Make iframe fill wrapper */
    .iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* Footer */
    .powered-by {
      text-align: center;
      font-size: 11px;
      color: var(--ink-subtle);
      margin: 6px 0 10px 0;
    }

    /* Mobile */
    @media (max-width: 480px) {
      .chat-container { height: 95vh; border-radius: 0; }
      .iframe-wrap { margin: 10px; }
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">Postbank FAQ Assistant</div>

    <!-- Optional welcome section -->
    <!-- <div class="welcome-text" role="note" aria-live="polite">
      <h3>Welcome to the Postbank FAQ Chatbot!</h3>
      <p>Ask about accounts, mobile banking, cards/ATM, transfers, SAYE, fees, or branch hours.</p>
    </div> -->

    <!-- Copilot Web App iframe -->
    <div class="iframe-wrap" role="region" aria-label="Postbank chat">
      <!-- 🔁 Replace ONLY the src value below with your Copilot Web app iframe URL -->
      <iframe
        title="Postbank FAQ Chatbot"
        src="https://copilotstudio.microsoft.com/environments/Default-8277ed46-86f3-4492-a0d9-d9b5821a1127/bots/copilots_header_3dd3e/webchat?__version__=2"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        allow="clipboard-write"
      ></iframe>
    </div>

    <!-- Footer -->
    <div class="powered-by">Powered by Postbank • Prototype</div>
  </div>
</body>
</html>
